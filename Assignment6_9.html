<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Input & Math Expressions</title>
</head>
<body>

<h1>User Input & Math Expressions</h1>

<div>
    <h2>Question 1</h2>
    <button onclick="
        var number = 8;
        var result = (number * 2) + 10;
        document.getElementById('output1').innerHTML = 'Result: ' + result;
    ">Run</button>

    <div id="output1"></div>
</div>

<hr>

<div>
    <h2>Question 2</h2>
    <button onclick="
        var a = 2, b = 1;
        var result = --a - --b + ++b + b--;

        document.getElementById('output2').innerHTML =
        'a = ' + a + '<br>' +
        'b = ' + b + '<br>' +
        'result = ' + result;
    ">Run</button>

    <div id="output2"></div>
</div>

<hr>

<div>
    <h2>Question 3</h2>
    <button onclick="
        var name = prompt('Enter your name:');
        alert('Hello ' + name + ', welcome!');
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 5</h2>
    <button onclick="
        var number = prompt('Enter a number:');

        if(number === null || number === ''){
            number = 5;
        }

        number = Number(number);

        var text = '';

        for(var i = 1; i <= 10; i++){
            text += number + ' x ' + i + ' = ' + (number * i) + '<br>';
        }

        document.getElementById('output5').innerHTML = text;
    ">Run</button>

    <div id="output5"></div>
</div>

<hr>

<div>
    <h2>Question 6</h2>
    <button onclick="
        var subject1 = prompt('Enter first subject name:');
        var subject2 = prompt('Enter second subject name:');
        var subject3 = prompt('Enter third subject name:');

        var totalMarksEach = 100;

        var obtained1 = Number(prompt('Enter marks obtained in ' + subject1 + ':'));
        var obtained2 = Number(prompt('Enter marks obtained in ' + subject2 + ':'));
        var obtained3 = Number(prompt('Enter marks obtained in ' + subject3 + ':'));

        var totalMarks = totalMarksEach * 3;
        var obtainedTotal = obtained1 + obtained2 + obtained3;
        var percentage = (obtainedTotal / totalMarks) * 100;

        var table = '<table border=1>';
        table += '<tr><th>Subject</th><th>Total Marks</th><th>Obtained Marks</th></tr>';
        table += '<tr><td>' + subject1 + '</td><td>' + totalMarksEach + '</td><td>' + obtained1 + '</td></tr>';
        table += '<tr><td>' + subject2 + '</td><td>' + totalMarksEach + '</td><td>' + obtained2 + '</td></tr>';
        table += '<tr><td>' + subject3 + '</td><td>' + totalMarksEach + '</td><td>' + obtained3 + '</td></tr>';
        table += '</table>';
        table += '<p>Total Marks: ' + totalMarks + '</p>';
        table += '<p>Obtained Marks: ' + obtainedTotal + '</p>';
        table += '<p>Percentage: ' + percentage + '%</p>';

        document.getElementById('output6').innerHTML = table;
    ">Run</button>

    <div id="output6"></div>
</div>

</body>
</html>
