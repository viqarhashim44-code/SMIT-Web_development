<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Names: Legal & Illegal</title>
</head>
<body>

<h1>Variable Names: Legal & Illegal</h1>

<div>
    <h2>Question 1</h2>
    <button onclick="
        var city='Karachi', country='Pakistan', zip=74400;
        alert('City: ' + city + '\nCountry: ' + country + '\nZIP: ' + zip);
    ">
        Run
    </button>
</div>

<hr>

<div>
    <h2>Question 2</h2>
    <button onclick="
        document.getElementById('output1').innerHTML =
        '<h3>Legal Variable Names</h3>' +
        'firstName<br>' +
        '_lastName<br>' +
        '$price<br>' +
        'myVar2<br>' +
        'total_amount<br><br>' +
        '<h3>Illegal Variable Names</h3>' +
        '2ndName<br>' +
        'first-name<br>' +
        'var<br>' +
        'my name<br>' +
        'class';
    ">
        Run
    </button>

    <div id="output1"></div>
</div>

<hr>

<div>
    <h2>Question 3</h2>
    <button onclick="
        document.getElementById('output2').innerHTML =
        '<h2>Rules for naming JS variables</h2>' +
        'Variable names can only contain letters, digits, underscores and dollar signs. For example $my_1stVariable<br><br>' +
        'Variables must begin with a letter, underscore or dollar sign. For example $name, _name or name<br><br>' +
        'Variable names are case sensitive<br><br>' +
        'Variable names should not be JS reserved words';
    ">
        Run
    </button>

    <div id="output2"></div>
</div>

</body>
</html>
