<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If...Else & Else If Statements</title>
</head>
<body>

<h1>If...Else & Else If Statements</h1>

<div>
    <h2>Question 1</h2>
    <button onclick="
        var input = prompt('Enter a character:');
        var code = input.charCodeAt(0);

        if(code >= 48 && code <= 57){
            alert('It is a number');
        }
        else if(code >= 65 && code <= 90){
            alert('It is an uppercase letter');
        }
        else if(code >= 97 && code <= 122){
            alert('It is a lowercase letter');
        }
        else{
            alert('Not a recognized character type');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 2</h2>
    <button onclick="
        var num1 = Number(prompt('Enter first number:'));
        var num2 = Number(prompt('Enter second number:'));

        if(num1 === num2){
            alert('Both numbers are equal');
        }
        else if(num1 > num2){
            alert(num1 + ' is larger');
        }
        else{
            alert(num2 + ' is larger');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 3</h2>
    <button onclick="
        var num = Number(prompt('Enter a number:'));

        if(num > 0){
            alert('The number is positive');
        }
        else if(num < 0){
            alert('The number is negative');
        }
        else{
            alert('The number is zero');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 4</h2>
    <button onclick="
        var letter = prompt('Enter a single character:');

        if(letter==='a'||letter==='e'||letter==='i'||letter==='o'||letter==='u'||
           letter==='A'||letter==='E'||letter==='I'||letter==='O'||letter==='U'){
            alert('true - it is a vowel');
        }
        else{
            alert('false - it is not a vowel');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 5</h2>
    <button onclick="
        var correctPassword='myPass123';
        var enteredPassword=prompt('Enter your password:');

        if(enteredPassword===null || enteredPassword===''){
            alert('Please enter your password');
        }
        else if(enteredPassword===correctPassword){
            alert('Correct! The password you entered matches the original password');
        }
        else{
            alert('Incorrect password');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 6</h2>
    <button onclick="
        var greeting;
        var hour=13;

        if(hour<18){
            greeting='Good day';
        }
        else{
            greeting='Good evening';
        }

        alert(greeting);
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 7</h2>
    <button onclick="
        var time=Number(prompt('Enter time in 24 hour format (e.g. 1900):'));
        var hour=Math.floor(time/100);

        if(hour>=5 && hour<12){
            alert('Good Morning');
        }
        else if(hour>=12 && hour<17){
            alert('Good Afternoon');
        }
        else if(hour>=17 && hour<21){
            alert('Good Evening');
        }
        else{
            alert('Good Night');
        }
    ">Run</button>
</div>

</body>
</html>
