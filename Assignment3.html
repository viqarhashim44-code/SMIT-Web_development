<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables for Numbers</title>
</head>
<body>

<h1>Variables for Numbers</h1>

<div>
    <h2>Question 1</h2>
    <button onclick="
        var age = 21;
        alert(age);
    ">
        Run
    </button>
</div>

<hr>

<div>
    <h2>Question 2</h2>
    <button onclick="
        var visits = 7;
        document.getElementById('output1').innerHTML = 'You have visited this site ' + visits + ' times';
    ">
        Run
    </button>

    <div id="output1"></div>
</div>

<hr>

<div>
    <h2>Question 3</h2>
    <button onclick="
        var birthYear = 2003;
        document.getElementById('output2').innerHTML = 'I was born in the year ' + birthYear;
    ">
        Run
    </button>

    <div id="output2"></div>
</div>

<hr>

<div>
    <h2>Question 4</h2>
    <button onclick="
        var visitorName = 'John Doe';
        var productTitle = 'T-shirt';
        var quantity = 5;
        document.getElementById('output3').innerHTML =
        visitorName + ' ordered ' + quantity + ' ' + productTitle + '(s) on XYZ Clothing store';
    ">
        Run
    </button>

    <div id="output3"></div>
</div>

</body>
</html>
