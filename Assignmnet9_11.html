<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If...Else Statements</title>
</head>
<body>

<h1>If...Else Statements</h1>

<div>
    <h2>Question 1</h2>
    <button onclick="
        var city = prompt('Enter your city:');
        if(city === 'Karachi'){
            alert('Welcome to city of lights');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 2</h2>
    <button onclick="
        var gender = prompt('Enter your gender (male/female):');

        if(gender === 'male'){
            alert('Good Morning Sir');
        }
        else if(gender === 'female'){
            alert('Good Morning Ma\\'am');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 3</h2>
    <button onclick="
        var signal = prompt('Enter signal color (Red/Yellow/Green):');

        if(signal === 'Red'){
            alert('Must Stop');
        }
        else if(signal === 'Yellow'){
            alert('Ready to move');
        }
        else if(signal === 'Green'){
            alert('Move now');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 4</h2>
    <button onclick="
        var fuel = Number(prompt('Enter remaining fuel in litres:'));

        if(fuel < 0.25){
            alert('Please refill the fuel in your car');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 5</h2>
    <button onclick="
        var output='';

        var a=4;
        if(++a===5){
            output+='a) given condition for variable a is true<br>';
        }

        var b=82;
        if(b++===83){
            output+='b) given condition for variable b is true<br>';
        }

        var c=12;
        if(c++===13){
            output+='c) condition 1 is true<br>';
        }
        if(c===13){
            output+='c) condition 2 is true<br>';
        }
        if(++c<14){
            output+='c) condition 3 is true<br>';
        }
        if(c===14){
            output+='c) condition 4 is true<br>';
        }

        var materialCost=20000;
        var laborCost=2000;
        var totalCost=materialCost+laborCost;

        if(totalCost===laborCost+materialCost){
            output+='d) The cost equals<br>';
        }

        if(true){
            output+='e) True<br>';
        }

        if(false){
            output+='e) False<br>';
        }

        if('car'<'cat'){
            output+='f) car is smaller than cat';
        }

        document.getElementById('output5').innerHTML=output;
    ">Run</button>

    <div id="output5"></div>
</div>

<hr>

<div>
    <h2>Question 6</h2>
    <button onclick="
        var marks1=Number(prompt('Enter marks for subject 1:'));
        var marks2=Number(prompt('Enter marks for subject 2:'));
        var marks3=Number(prompt('Enter marks for subject 3:'));

        var totalMarks=300;
        var obtainedMarks=marks1+marks2+marks3;
        var percentage=(obtainedMarks/totalMarks)*100;

        var grade='';
        var remarks='';

        if(percentage>=90){
            grade='A';
            remarks='Excellent';
        }
        else if(percentage>=75){
            grade='B';
            remarks='Very Good';
        }
        else if(percentage>=60){
            grade='C';
            remarks='Good';
        }
        else if(percentage>=40){
            grade='D';
            remarks='Pass';
        }
        else{
            grade='F';
            remarks='Fail';
        }

        document.getElementById('output6').innerHTML=
        'Total Marks: '+totalMarks+'<br>'+
        'Obtained Marks: '+obtainedMarks+'<br>'+
        'Percentage: '+percentage+'%<br>'+
        'Grade: '+grade+'<br>'+
        'Remarks: '+remarks;
    ">Run</button>

    <div id="output6"></div>
</div>

<hr>

<div>
    <h2>Question 7</h2>
    <button onclick="
        var secretNumber=6;
        var guess=Number(prompt('Guess a number between 1 and 10:'));

        if(guess===secretNumber){
            alert('Bingo! Correct answer');
        }
        else if(guess+1===secretNumber){
            alert('Close enough to the correct answer');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 8</h2>
    <button onclick="
        var num=Number(prompt('Enter a number:'));

        if(num%3===0){
            alert(num+' is divisible by 3');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 9</h2>
    <button onclick="
        var num=Number(prompt('Enter a number:'));

        if(num%2===0){
            alert(num+' is even');
        }
        else{
            alert(num+' is odd');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 10</h2>
    <button onclick="
        var temp=Number(prompt('Enter temperature:'));

        if(temp>40){
            alert('It is too hot outside.');
        }
        else if(temp>30){
            alert('The Weather today is Normal.');
        }
        else if(temp>20){
            alert('Today\\'s Weather is cool.');
        }
        else if(temp>10){
            alert('OMG! Today\\'s weather is so Cool.');
        }
    ">Run</button>
</div>

<hr>

<div>
    <h2>Question 11</h2>
    <button onclick="
        var num1=Number(prompt('Enter first number:'));
        var num2=Number(prompt('Enter second number:'));
        var operation=prompt('Enter operation (+, -, *, /, %):');

        var result;

        if(operation==='+'){
            result=num1+num2;
        }
        else if(operation==='-'){
            result=num1-num2;
        }
        else if(operation==='*'){
            result=num1*num2;
        }
        else if(operation==='/'){
            result=num1/num2;
        }
        else if(operation==='%'){
            result=num1%num2;
        }

        alert('Result: '+result);
    ">Run</button>
</div>

</body>
</html>
