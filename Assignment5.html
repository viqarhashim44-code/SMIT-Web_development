<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Expressions</title>
</head>
<body>

<h1>Math Expressions</h1>

<div>
    <h2>Question 1</h2>
    <button onclick="
        var num1 = 10;
        var num2 = 5;
        var sum = num1 + num2;
        document.getElementById('output1').innerHTML = 'Sum is: ' + sum;
    ">Run</button>
    <div id="output1"></div>
</div>

<hr>

<div>
    <h2>Question 2</h2>
    <button onclick="
        var a = 10;
        var b = 5;

        var subtraction = a - b;
        var multiplication = a * b;
        var division = a / b;
        var modulus = a % b;

        document.getElementById('output2').innerHTML =
        'Subtraction: ' + subtraction + '<br>' +
        'Multiplication: ' + multiplication + '<br>' +
        'Division: ' + division + '<br>' +
        'Modulus: ' + modulus;
    ">Run</button>
    <div id="output2"></div>
</div>

<hr>

<div>
    <h2>Question 3</h2>
    <button onclick="
        var num;
        var text = 'Value after variable declaration is: ' + num + '<br>';

        num = 5;
        text += 'Initial value: ' + num + '<br>';

        num++;
        text += 'Value after increment is: ' + num + '<br>';

        num = num + 7;
        text += 'Value after addition is: ' + num + '<br>';

        num--;
        text += 'Value after decrement is: ' + num + '<br>';

        var remainder = num % 3;
        text += 'The remainder is: ' + remainder;

        document.getElementById('output3').innerHTML = text;
    ">Run</button>
    <div id="output3"></div>
</div>

<hr>

<div>
    <h2>Question 4</h2>
    <button onclick="
        var ticketPrice = 600;
        var quantity = 5;
        var totalCost = ticketPrice * quantity;

        document.getElementById('output4').innerHTML =
        'Cost of ' + quantity + ' tickets is: ' + totalCost + ' PKR';
    ">Run</button>
    <div id="output4"></div>
</div>

<hr>

<div>
    <h2>Question 5</h2>
    <button onclick="
        var number = 7;
        var text = '';

        for(var i = 1; i <= 10; i++){
            text += number + ' x ' + i + ' = ' + (number * i) + '<br>';
        }

        document.getElementById('output5').innerHTML = text;
    ">Run</button>
    <div id="output5"></div>
</div>

<hr>

<div>
    <h2>Question 6</h2>
    <button onclick="
        var celsius = 30;
        var fahrenheit = (celsius * 9 / 5) + 32;

        var fahrenheitInput = 98;
        var celsiusResult = (fahrenheitInput - 32) * 5 / 9;

        document.getElementById('output6').innerHTML =
        celsius + '&deg;C is ' + fahrenheit + '&deg;F<br>' +
        fahrenheitInput + '&deg;F is ' + celsiusResult + '&deg;C';
    ">Run</button>
    <div id="output6"></div>
</div>

<hr>

<div>
    <h2>Question 7</h2>
    <button onclick="
        var priceItem1 = 1200;
        var priceItem2 = 800;
        var qtyItem1 = 2;
        var qtyItem2 = 3;
        var shippingCharges = 250;

        var totalCost = (priceItem1 * qtyItem1) + (priceItem2 * qtyItem2) + shippingCharges;

        document.getElementById('output7').innerHTML =
        'Item 1 cost: ' + (priceItem1 * qtyItem1) + '<br>' +
        'Item 2 cost: ' + (priceItem2 * qtyItem2) + '<br>' +
        'Shipping: ' + shippingCharges + '<br>' +
        'Total Cost: ' + totalCost;
    ">Run</button>
    <div id="output7"></div>
</div>

<hr>

<div>
    <h2>Question 8</h2>
    <button onclick="
        var totalMarks = 500;
        var obtainedMarks = 420;
        var percentage = (obtainedMarks / totalMarks) * 100;

        document.getElementById('output8').innerHTML =
        'Percentage: ' + percentage + '%';
    ">Run</button>
    <div id="output8"></div>
</div>

<hr>

<div>
    <h2>Question 9</h2>
    <button onclick="
        var totalPKR = (10 * 104.80) + (25 * 28);

        document.getElementById('output9').innerHTML =
        'Total in Pakistani Rupees: ' + totalPKR;
    ">Run</button>
    <div id="output9"></div>
</div>

<hr>

<div>
    <h2>Question 10</h2>
    <button onclick="
        var number = 4;
        var result = ((number + 5) * 10) / 2;

        document.getElementById('output10').innerHTML =
        'Result: ' + result;
    ">Run</button>
    <div id="output10"></div>
</div>

<hr>

<div>
    <h2>Question 11</h2>
    <button onclick="
        var currentYear = 2026;
        var birthYear = 2000;
        var age1 = currentYear - birthYear;
        var age2 = age1 - 1;

        document.getElementById('output11').innerHTML =
        'They are either ' + age2 + ' or ' + age1 + ' years old';
    ">Run</button>
    <div id="output11"></div>
</div>

<hr>

<div>
    <h2>Question 12</h2>
    <button onclick="
        var radius = 7;
        var pi = 3.142;
        var circumference = 2 * pi * radius;
        var area = pi * radius * radius;

        document.getElementById('output12').innerHTML =
        'The circumference is ' + circumference + '<br>' +
        'The area is ' + area;
    ">Run</button>
    <div id="output12"></div>
</div>

<hr>

<div>
    <h2>Question 13</h2>
    <button onclick="
        var snack = 'chocolate bars';
        var currentAge = 21;
        var maxAge = 80;
        var perDay = 1;

        var remainingYears = maxAge - currentAge;
        var totalSnacks = remainingYears * 365 * perDay;

        document.getElementById('output13').innerHTML =
        'You will need ' + totalSnacks + ' ' + snack +
        ' to last you until the ripe old age of ' + maxAge;
    ">Run</button>
    <div id="output13"></div>
</div>

</body>
</html>
